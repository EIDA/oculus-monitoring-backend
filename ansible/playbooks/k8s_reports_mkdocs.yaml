---
- name: Deploy mkdocs in k8s for reports eida-consistency
  hosts: localhost
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python
    mkdocs_namespace: eida-monitoring
    mkdocs_app_name: oculus-eida-reports
    mkdocs_image: squidfunk/mkdocs-material:latest # 9.7.5
    nginx_image: nginx:latest
    mkdocs_port: 80
    mkdocs_replica_count: 1

  tasks:
    - name: Create Service for mkdocs
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ mkdocs_app_name }}-service"
            namespace: "{{ mkdocs_namespace }}"
          spec:
            selector:
              app: "{{ mkdocs_app_name }}"
            ports:
              - protocol: TCP
                port: 80
                targetPort: "{{ mkdocs_port }}"
            type: ClusterIP

    - name: Create Ingress for mkdocs
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: "{{ mkdocs_app_name }}-ingress"
            namespace: "{{ mkdocs_namespace }}"
          spec:
            rules:
              - host: "eida-oculus.orfeus-eu.org"
                http:
                  paths:
                    - path: /consistency
                      pathType: Prefix
                      backend:
                        service:
                          name: "{{ mkdocs_app_name }}-service"
                          port:
                            number: 80

    - name: Create ConfigMap for nginx.conf
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ mkdocs_app_name }}-nginx-config"
            namespace: "{{ mkdocs_namespace }}"
          data:
            default.conf: |
              server {
                listen 80;
                server_name _;
                root /app/site;
                index index.html;
                error_page 404 /404.html;

                location / {
                  root /app/site;
                  try_files $uri $uri/ /index.html =404;
                }

                location /consistency/ {
                  alias /app/site/;
                  index index.html;
                }
              }

    - name: Create ConfigMap for mkdocs.yml
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ mkdocs_app_name }}-config"
            namespace: "{{ mkdocs_namespace }}"
          data:
            mkdocs.yml: |
              site_name: EIDA Consistency reports
              site_url: https://eida-oculus.orfeus-eu.org/consistency/
              docs_dir: /scratch/reports/export
              site_dir: /app/site
              theme:
                name: material
                features:
                  - navigation.instant
                  - content.tabs.link
              plugins:
                - search
                - tags
              markdown_extensions:
                - toc
                - tables
                - codehilite
                - meta
              nav_strict: false

    - name: Create ConfigMap for makeindex script
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ mkdocs_app_name }}-makeindex"
            namespace: "{{ mkdocs_namespace }}"
          data:
            makeindex.sh: |
              #!/bin/sh
              mkdir -p /scratch/reports/export

              # generate main index with nodes
              cat > /scratch/reports/export/index.md << 'EOF'
              # Reports by nodes

              EOF

              # check nodes in /scratch/reports/
              for nodedir in /scratch/reports/*/; do
                # ignore folder export
                if [ "$(basename "$nodedir")" != "export" ]; then
                  nodename=$(basename "$nodedir")

                  # create folder for nodes in export folder
                  mkdir -p "/scratch/reports/export/$nodename"

                  # create main index ld for node listing years
                  cat > "/scratch/reports/export/$nodename/index.md" << EOF2
              ---
              tags:
                - $nodename
              ---

              # $nodename Reports

              EOF2

                  # collect all unique years from files
                  temp_years="/tmp/years_${nodename}.txt"
                  > "$temp_years"

                  for file in "$nodedir"*.md; do
                    if [ -f "$file" ]; then
                      filename=$(basename "$file")
                      # extract date from filename (format: nodename_YYYYMMDD_xxxxxx_xxxxxx.md)
                      datepart=$(echo "$filename" | sed 's/.*_\([0-9]\{8\}\)_.*/\1/')

                      if [ "$datepart" != "$filename" ] && [ -n "$datepart" ]; then
                        year=$(echo "$datepart" | cut -c1-4)
                      else
                        year="undated"
                      fi

                      echo "$year" >> "$temp_years"
                    fi
                  done

                  # sort years in reverse order and remove duplicates
                  sorted_years=$(sort -r "$temp_years" | uniq)
                  rm "$temp_years"

                  # process each year
                  for year in $sorted_years; do
                    mkdir -p "/scratch/reports/export/$nodename/$year"

                    # create index.md for year
                    cat > "/scratch/reports/export/$nodename/$year/index.md" << EOF3
              ---
              tags:
                - $nodename
                - $year
              ---

              # $nodename - $year

              EOF3

                    temp_index="/tmp/index_links_${nodename}_${year}.txt"
                    > "$temp_index"

                    # process files for this year
                    for file in "$nodedir"*.md; do
                      if [ -f "$file" ]; then
                        filename=$(basename "$file")
                        # extract date from filename
                        datepart=$(echo "$filename" | sed 's/.*_\([0-9]\{8\}\)_.*/\1/')

                        if [ "$datepart" != "$filename" ] && [ -n "$datepart" ]; then
                          year_check=$(echo "$datepart" | cut -c1-4)

                          # only process files fo r this year
                          if [ "$year_check" = "$year" ]; then
                            month=$(echo "$datepart" | cut -c5-6)
                            day=$(echo "$datepart" | cut -c7-8)
                            date_formatted="$year_check-$month-$day"
                            suffix=$(echo "$filename" | sed 's/.*_[0-9]\{8\}_\(.*\).md$/\1/')
                            new_filename="${nodename}_${date_formatted}_${suffix}.md"
                            new_title="# $nodename: $date_formatted - $suffix"
                          else
                            continue
                          fi
                        else
                          continue
                        fi

                        # copy file to year folder
                        cp "$file" "/scratch/reports/export/$nodename/$year/$new_filename"

                        # replace first kube with the new title
                        {
                          echo "$new_title"
                          tail -n +2 "/scratch/reports/export/$nodename/$year/$new_filename"
                        } > /tmp/temp_file
                        mv /tmp/temp_file "/scratch/reports/export/$nodename/$year/$new_filename"

                        # add tags if not exist
                        if ! grep -q "^---" "/scratch/reports/export/$nodename/$year/$new_filename"; then
                          {
                            printf '---\ntags:\n  - %s\n  - %s\n---\n\n' "$nodename" "$year"
                            cat "/scratch/reports/export/$nodename/$year/$new_filename"
                          } > /tmp/temp_file
                          mv /tmp/temp_file "/scratch/reports/export/$nodename/$year/$new_filename"
                        fi

                        # add lik to temp file
                        filenamenoext="${new_filename%.md}"
                        echo "- $date_formatted - [$filenamenoext]($new_filename)" >> "$temp_index"
                      fi
                    done

                    # sort link in reverse order (newest first) ad append to year index
                    sort -r "$temp_index" >> "/scratch/reports/export/$nodename/$year/index.md"
                    rm "$temp_index"

                    # process JSON file for this year
                    for file in "$nodedir"*.json; do
                      if [ -f "$file" ]; then
                        filename=$(basename "$file")
                        # extract date from filename (format: nodename_YYYYMMDD_xxxxxx_xxxxxx.json)
                        datepart=$(echo "$filename" | sed 's/.*_\([0-9]\{8\}\)_.*/\1/')

                        if [ "$datepart" != "$filename" ] && [ -n "$datepart" ]; then
                          year_check=$(echo "$datepart" | cut -c1-4)

                          # only process files for this year
                          if [ "$year_check" = "$year" ]; then
                            month=$(echo "$datepart" | cut -c5-6)
                            day=$(echo "$datepart" | cut -c7-8)
                            date_formatted="$year_check-$month-$day"
                            suffix=$(echo "$filename" | sed 's/.*_[0-9]\{8\}_\(.*\)\.json$/\1/')
                            new_filename="${nodename}_${date_formatted}_${suffix}.json"

                            # copy file to year folder
                            cp "$file" "/scratch/reports/export/$nodename/$year/$new_filename"
                          fi
                        fi
                      fi
                    done

                    # add link to node index
                    echo "- [$year]($year/)" >> "/scratch/reports/export/$nodename/index.md"
                  done

                  # add link to main index
                  echo "- [$nodename]($nodename/) {: data-tags=\"$nodename\" }" >> /scratch/reports/export/index.md
                fi
              done

              # generate nav for mkdocs
              cat > /tmp/nav.yaml << 'NAVEOF'
              nav:
                - Reports by nodes: index.md
              NAVEOF

              for nodedir in /scratch/reports/export/*/; do
                if [ "$(basename "$nodedir")" != "export" ] && [ -d "$nodedir" ]; then
                  nodename=$(basename "$nodedir")
                  if [ -f "$nodedir/index.md" ]; then
                    echo "  - $nodename:" >> /tmp/nav.yaml
                    echo "    - Reports: $nodename/index.md" >> /tmp/nav.yaml

                    # add years a sub-items under reports
                    for yeardir in "$nodedir"/*/; do
                      if [ -d "$yeardir" ]; then
                        year=$(basename "$yeardir")
                        echo "    - $year:" >> /tmp/nav.yaml

                        # add year overview/index page first
                        echo "      - Overview: $nodename/$year/index.md" >> /tmp/nav.yaml

                        # add individual reports sorted by date descending (newest first)
                        reports_list=$(printf '%s\n' "$yeardir"/*.md | sort -r)
                        for report in $reports_list; do
                          if [ -f "$report" ] && [ "$(basename "$report")" != "index.md" ]; then
                            filename=$(basename "$report" .md)
                            relpath="$nodename/$year/$(basename "$report")"
                            echo "      - $filename: $relpath" >> /tmp/nav.yaml
                          fi
                        done
                      fi
                    done
                  fi
                fi
              done

              # create mkdocs.yml complet with generated nav
              cat > /tmp/mkdocs_full.yml << 'EOF'
              site_name: EIDA Consistency Reports
              site_url: https://eida-oculus.orfeus-eu.org/consistency/
              docs_dir: /scratch/reports/export
              site_dir: /app/site
              theme:
                name: material
                features:
                  - navigation.instant
                  - content.tabs.link
              plugins:
                - search
                - tags
              markdown_extensions:
                - toc
                - tables
                - codehilite
                - meta
              EOF

              cat /tmp/nav.yaml >> /tmp/mkdocs_full.yml

              # build mkdocs with complated file
              mkdocs build -f /tmp/mkdocs_full.yml

    - name: Deploy mkdocs build and nginx
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ mkdocs_app_name }}"
            namespace: "{{ mkdocs_namespace }}"
            labels:
              app: "{{ mkdocs_app_name }}"
          spec:
            replicas: "{{ mkdocs_replica_count }}"
            selector:
              matchLabels:
                app: "{{ mkdocs_app_name }}"
            template:
              metadata:
                labels:
                  app: "{{ mkdocs_app_name }}"
              spec:
                initContainers:
                  - name: mkdocs-build
                    image: "{{ mkdocs_image }}"
                    command:
                      - sh
                      - -c
                      - |
                        cp /makeindex-script/makeindex.sh /scratch/makeindex.sh
                        chmod +x /scratch/makeindex.sh
                        /scratch/makeindex.sh
                    securityContext:
                      runAsUser: 1500
                    volumeMounts:
                      - name: config-volume
                        mountPath: /etc/mkdocs
                      - name: scratch
                        mountPath: /scratch
                      - name: site-volume
                        mountPath: /app
                      - name: makeindex-script
                        mountPath: /makeindex-script
                containers:
                  - name: nginx
                    image: "{{ nginx_image }}"
                    ports:
                      - containerPort: "{{ mkdocs_port }}"
                    volumeMounts:
                      - name: nginx-config
                        mountPath: /etc/nginx/conf.d
                      - name: site-volume
                        mountPath: /app
                    livenessProbe:
                      httpGet:
                        path: /consistency/
                        port: "{{ mkdocs_port }}"
                      initialDelaySeconds: 10
                      periodSeconds: 10
                    readinessProbe:
                      httpGet:
                        path: /consistency/
                        port: "{{ mkdocs_port }}"
                      initialDelaySeconds: 5
                      periodSeconds: 5
                volumes:
                  - name: config-volume
                    configMap:
                      name: "{{ mkdocs_app_name }}-config"
                  - name: nginx-config
                    configMap:
                      name: "{{ mkdocs_app_name }}-nginx-config"
                  - name: makeindex-script
                    configMap:
                      name: "{{ mkdocs_app_name }}-makeindex"
                  - name: scratch
                    persistentVolumeClaim:
                      claimName: oculus-consistency
                  - name: site-volume
                    emptyDir: {}

    - name: Create CronJob for weekly mkdocs rebuild
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: "{{ mkdocs_app_name }}-rebuild"
            namespace: "{{ mkdocs_namespace }}"
          spec:
            schedule: "0 20 * * 0" # sunday at 20h00
            jobTemplate:
              spec:
                template:
                  spec:
                    serviceAccountName: "{{ mkdocs_app_name }}-sa"
                    containers:
                      - name: mkdocs-rebuild
                        image: bitnami/kubectl:latest
                        command:
                          - sh
                          - -c
                          - |
                            # check if deployement exist
                            if kubectl get deployment {{ mkdocs_app_name }} -n {{ mkdocs_namespace }} > /dev/null 2>&1; then
                              echo "deployement found, restarting..."
                              kubectl rollout restart deployment/{{ mkdocs_app_name }} -n {{ mkdocs_namespace }}
                            else
                              echo "deployement not found, skiping restart"
                            fi
                    restartPolicy: OnFailure

    - name: Create ServiceAccount for CronJob
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: "{{ mkdocs_app_name }}-sa"
            namespace: "{{ mkdocs_namespace }}"

    - name: Create Role for CronJob
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: "{{ mkdocs_app_name }}-role"
            namespace: "{{ mkdocs_namespace }}"
          rules:
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "patch", "update"]
            - apiGroups: ["apps"]
              resources: ["deployments/rollout"]
              verbs: ["create"]

    - name: Create RoleBinding for CronJob
      kubernetes.core.k8s:
        state: present
        namespace: "{{ mkdocs_namespace }}"
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: "{{ mkdocs_app_name }}-rolebinding"
            namespace: "{{ mkdocs_namespace }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: "{{ mkdocs_app_name }}-role"
          subjects:
            - kind: ServiceAccount
              name: "{{ mkdocs_app_name }}-sa"
              namespace: "{{ mkdocs_namespace }}"
