          timeout: 1m
          url: 'https://{$ENDPOINT}/fdsnws/availability/1/'
          status_codes: ''
          headers:
            - name: User-agent
              value: oculus-monitor
          retrieve_mode: HEADERS
          tags:
            - tag: availability
              value: accessible
            - tag: webservice
              value: availability
          triggers:
            - uuid: 5397d9f5f56b4574abfb297603b86186
              expression: 'last(/Template webservices/availability.accessible)<>200'
              name: 'availability accessible'
              event_name: 'Availability is not accessible, return code {ITEM.VALUE}'
              priority: AVERAGE
              description: 'test request: https://{$ENDPOINT}/fdsnws/availability/1/'
              manual_close: 'YES'
              tags:
                - tag: webservice
                  value: availability
